services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: domainhunter
      POSTGRES_PASSWORD: domainhunter_local
      POSTGRES_DB: domainhunter
    ports:
      - "5432:5432"
    volumes:
      - domainhunter_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U domainhunter -d domainhunter"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  domainhunter_postgres:
